<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body class="bg-gray-100 flex items-center justify-center">
    <div class="bg-white shape-xl rounded-2xl p-6 w-full max-w-md mt-6">
        <h1 class="text-2xl font-bold text-center text-green-600 mb-4">Student Score System</h1>
    
    <form action="" id="studentScore">
        <div>
            <label for="" class="text-gray-700 mb-1">Student Name:</label>
            <input type="text" placeholder="Enter student name"
            class="w-full border border-gray-300 rounded-lg p-2 hover:bg-gray-100" id="name">
        </div><br>
        <div>
            <label for="" class="text-gray-700 mb-1">Matric Number</label>
            <input type="text" placeholder="Enter student matric number" id="matric"
            class="w-full border border-gray-300 rounded-lg p-2 hover:bg-gray-100">
        </div><br>
        <div>
            <label for="" class="text-gray-700 mb-1">Student Course:</label>
            <input type="text" placeholder="Enter student course" id="course"
            class="w-full border border-gray-300 rounded-lg p-2 hover:bg-gray-100">
        </div><br>
        <div>
            <label for="" class="text-gray-700 mb-1">Enter Student Score:</label>
            <input type="text" placeholder="Enter student score"  id="score"
            class="w-full border border-gray-300 rounded-lg p-2 hover:bg-gray-100">
        </div><br>
        <button class="bg-green-600 w-full text-white py-2 rounded-xl hover:bg-green-500 ">Submit</button>
    </form>
    <p id="message"></p>
    <div id="result"></div>
    </div>

    
    <script src="score.js"></script>
</body>
</html>
